<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

  <title>Pulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .pulse-card { border-bottom: 1px solid rgb(39 39 42); }
    .pulse-card:last-child { border-bottom: none; }
    .tab-active { border-bottom: 2px solid #7c3aed; color: #e4e4e7; font-weight: 700; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #71717a; font-weight: 500; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #4c1d95; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #ddd6fe; flex-shrink: 0; cursor: pointer; }
    .avatar-sm { width: 36px; height: 36px; border-radius: 50%; background: #4c1d95; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #ddd6fe; flex-shrink: 0; }
    .avatar-xs { width: 28px; height: 28px; border-radius: 50%; background: #4c1d95; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; color: #ddd6fe; flex-shrink: 0; }
    .avatar-lg { width: 64px; height: 64px; font-size: 22px; }
    textarea { resize: none; }
    textarea:focus { outline: none; }
    .nav-btn { display: flex; align-items: center; gap: 14px; padding: 10px 14px; border-radius: 9999px; width: 100%; text-align: left; font-size: 17px; font-weight: 500; color: #e4e4e7; transition: background-color 0.15s; cursor: pointer; }
    .nav-btn:hover { background: rgb(39 39 42); }

    .mob-nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; flex: 1; padding: 8px 0; color: #71717a; transition: color 0.15s; cursor: pointer; border: none; background: none; }
    .mob-nav-btn:hover, .mob-nav-btn.active { color: #7c3aed; }
    #toast { transition: opacity 0.3s ease; }
  </style>
</head>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('token') || '';
const HEADERS = { 'Content-Type': 'application/json', ...(TOKEN ? { 'x-usernode-token': TOKEN } : {}) };

const APP = {
  me: { id: null, username: '', usernode_pubkey: null },
  currentTab: 'trending',
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: { ...HEADERS, ...(opts.headers || {}) },
    body: opts.body !== undefined ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
  }).then(r => r.json());
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

function initials(username) {
  return (username || '?').slice(0, 2).toUpperCase();
}

function abbrevPubkey(pk) {
  if (!pk) return '';
  return pk.slice(0, 7) + '…' + pk.slice(-4);
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.background = isError ? 'rgb(127 29 29)' : 'rgb(39 39 42)';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function navigateToProfile() {
  if (APP.me.username) navigate('profile/' + encodeURIComponent(APP.me.username));
}

function updateNavActive(route) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mob-nav-btn').forEach(b => b.classList.remove('active'));
  const isHome = !route || route === 'feed' || route === '';
  const isProfile = route && route.startsWith('profile/') && decodeURIComponent(route.slice('profile/'.length)) === APP.me.username;
  const isSearch = route === 'search';
  if (isHome) {
    document.getElementById('nav-home')?.classList.add('active');
    document.getElementById('mob-nav-home')?.classList.add('active');
  } else if (isProfile) {
    document.getElementById('nav-profile')?.classList.add('active');
    document.getElementById('mob-nav-profile')?.classList.add('active');
  } else if (isSearch) {
    document.getElementById('nav-search')?.classList.add('active');
    document.getElementById('mob-nav-search')?.classList.add('active');
  }
}

// ── SVG Icons ─────────────────────────────────────────────────────────────────
const ICON_HEART_EMPTY = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
const ICON_HEART_FILLED = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#8b5cf6" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
const ICON_COMMENT = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`;
const ICON_CHAIN = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`;
const ICON_BACK = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`;

// ── On-chain post anchoring (DORMANT) ─────────────────────────────────────────
// Currently unused: on-chain anchoring is disabled in the posting flow on
// testnet, so handleCompose stores posts unsigned. This helper, the
// signature/sign_message columns, and the chain-icon rendering are kept in
// place so signing can be re-enabled later by calling anchorPost() again.
async function anchorPost(content) {
  if (typeof usernode === 'undefined' || typeof usernode.sendTransaction !== 'function') {
    showToast('Usernode bridge not available', true);
    return null;
  }
  try {
    const result = await usernode.sendTransaction(
      APP.me.usernode_pubkey, 1, content,
      { confirmTitle: 'Publish to Pulse', confirmSubtitle: content.slice(0, 80) }
    );
    const r = result;
    return r?.tx_id || r?.txid || r?.txId || r?.hash || r?.tx_hash || r?.txHash || r?.id
        || r?.tx?.tx_id || r?.tx?.txid || r?.tx?.txId || r?.tx?.hash || r?.tx?.tx_hash || r?.tx?.txHash || r?.tx?.id
        || null;
  } catch (e) {
    return null;
  }
}

// ── Compose box ───────────────────────────────────────────────────────────────
function renderComposeBox(placeholder, actionType) {
  const hasPubkey = !!APP.me.usernode_pubkey;
  const tip = hasPubkey ? '' : 'Link your Usernode wallet to post.';
  return `
    <div id="compose-box" class="p-4 border-b border-zinc-800">
      <div class="flex gap-3 items-start">
        <div class="avatar mt-0.5" onclick="navigateToProfile()">${esc(initials(APP.me.username))}</div>
        <div class="flex-1 min-w-0">
          <textarea id="compose-text" rows="3" maxlength="280"
            class="w-full bg-transparent text-zinc-100 placeholder-zinc-500 text-base border-b border-zinc-700 pb-2 mb-3"
            placeholder="${esc(placeholder || "What's your pulse?")}"
            ${!hasPubkey ? 'disabled' : ''}
            oninput="updateComposeCounter(this)"
          ></textarea>
          <div class="flex items-center justify-between">
            <span id="compose-counter" class="text-xs text-zinc-500">0 / 280</span>
            <button id="compose-btn"
              class="px-5 py-2 rounded-full bg-violet-600 hover:bg-violet-500 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-bold transition-colors"
              ${!hasPubkey ? `disabled title="${esc(tip)}"` : ''}
              onclick="handleCompose('${esc(actionType || 'post')}')"
            >Post</button>
          </div>
          ${!hasPubkey ? `<p class="mt-2 text-xs text-zinc-500">${esc(tip)}</p>` : ''}
        </div>
      </div>
    </div>
  `;
}

function updateComposeCounter(el) {
  const n = el.value.length;
  const counter = document.getElementById('compose-counter');
  if (counter) {
    counter.textContent = n + ' / 280';
    counter.className = 'text-xs ' + (n > 260 ? 'text-red-400' : 'text-zinc-500');
  }
}

async function handleCompose(type) {
  const btn = document.getElementById('compose-btn');
  const ta = document.getElementById('compose-text');
  const content = ta ? ta.value.trim() : '';
  if (!content) { showToast('Write something first.', true); return; }
  if (content.length > 280) { showToast('Too long — max 280 chars.', true); return; }
  const pulseId = window._threadPulseId;

  btn.disabled = true;
  btn.textContent = 'Posting…';

  try {
    let body, res;

    if (type === 'comment' && pulseId) {
      body = { content, signature: null, sign_message: null, pubkey: APP.me.usernode_pubkey };
      res = await api(`/api/pulses/${pulseId}/comments`, { method: 'POST', body });
      if (res.error) throw new Error(res.error);
      showToast('Reply posted!');
    } else {
      // On-chain anchoring is disabled in the posting flow (testnet) — posts
      // are stored unsigned, like comments and likes. The anchorPost helper,
      // signature/sign_message columns, and chain-icon rendering remain in
      // place but dormant so signing can be re-enabled later.
      body = { content, signature: null, sign_message: null, pubkey: APP.me.usernode_pubkey };
      res = await api('/api/pulses', { method: 'POST', body });
      if (res.error) throw new Error(res.error);
      showToast('Pulse posted!');
    }

    ta.value = '';
    updateComposeCounter(ta);

    if (type === 'comment' && pulseId) {
      renderThreadView(pulseId);
    } else {
      APP.currentTab = 'following';
      renderFeed();
    }
  } catch (e) {
    showToast(e.message || 'Failed to post.', true);
    btn.disabled = false;
    btn.textContent = 'Post';
  }
}

// ── Pulse card ────────────────────────────────────────────────────────────────
function renderPulseCard(p, large) {
  const liked = p.liked_by_me;
  const hasSig = !!p.signature;
  const avatarCls = large ? 'avatar avatar-lg' : 'avatar';
  const textCls = large ? 'text-base leading-relaxed' : 'text-sm leading-relaxed';
  return `
    <div class="pulse-card p-4 hover:bg-white/[0.02] transition-colors">
      <div class="flex gap-3">
        <div class="${avatarCls}" onclick="navigate('profile/${esc(p.username)}')">${esc(initials(p.username))}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-baseline gap-2 flex-wrap mb-1">
            <button class="font-semibold text-zinc-100 hover:underline text-sm" onclick="navigate('profile/${esc(p.username)}')">${esc(p.username)}</button>
            ${hasSig ? `<span class="text-violet-400 inline-flex items-center gap-0.5 text-xs" title="Signed · ${esc(abbrevPubkey(p.usernode_pubkey))}">${ICON_CHAIN} <span class="hidden sm:inline">${esc(abbrevPubkey(p.usernode_pubkey))}</span></span>` : ''}
            <span class="text-zinc-500 text-xs">${timeAgo(p.created_at)}</span>
          </div>
          <p class="${textCls} text-zinc-100 whitespace-pre-wrap break-words">${esc(p.content)}</p>
          <div class="flex items-center gap-6 mt-3">
            <button class="flex items-center gap-1.5 text-zinc-500 hover:text-violet-400 transition-colors text-sm group"
              onclick="handleLike(${p.id}, ${!!liked})" id="like-btn-${p.id}">
              <span id="like-icon-${p.id}">${liked ? ICON_HEART_FILLED : ICON_HEART_EMPTY}</span>
              <span id="like-count-${p.id}" class="${liked ? 'text-violet-400' : ''}">${p.like_count || 0}</span>
            </button>
            <button class="flex items-center gap-1.5 text-zinc-500 hover:text-sky-400 transition-colors text-sm"
              onclick="navigate('pulse/${p.id}')">
              ${ICON_COMMENT}
              <span>${p.comment_count || 0}</span>
            </button>
            ${p.user_id === APP.me.id ? `<button class="ml-auto text-xs text-zinc-600 hover:text-red-400 transition-colors" onclick="handleDelete(${p.id})">Delete</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

async function handleLike(pulseId, currentlyLiked) {
  if (!APP.me.usernode_pubkey) {
    showToast('Link your Usernode wallet to like posts.', true);
    return;
  }
  const btn = document.getElementById('like-btn-' + pulseId);
  if (btn) btn.disabled = true;

  try {
    let res;
    if (currentlyLiked) {
      res = await api(`/api/pulses/${pulseId}/like`, { method: 'DELETE' });
    } else {
      res = await api(`/api/pulses/${pulseId}/like`, {
        method: 'POST',
        body: { pubkey: APP.me.usernode_pubkey },
      });
    }
    if (res.error) throw new Error(res.error);
    const newLiked = !currentlyLiked;
    const iconEl = document.getElementById('like-icon-' + pulseId);
    const countEl = document.getElementById('like-count-' + pulseId);
    if (iconEl) iconEl.innerHTML = newLiked ? ICON_HEART_FILLED : ICON_HEART_EMPTY;
    if (countEl) { countEl.textContent = res.like_count; countEl.className = newLiked ? 'text-violet-400' : ''; }
    if (btn) { btn.setAttribute('onclick', `handleLike(${pulseId}, ${newLiked})`); btn.disabled = false; }
  } catch (e) {
    showToast(e.message || 'Failed.', true);
    if (btn) btn.disabled = false;
  }
}

async function handleDelete(pulseId) {
  if (!confirm('Delete this pulse?')) return;
  const res = await api(`/api/pulses/${pulseId}`, { method: 'DELETE' });
  if (res.error) { showToast(res.error, true); return; }
  showToast('Pulse deleted.');
  if ((location.hash || '').startsWith('#pulse/')) {
    navigate('feed');
  } else {
    const card = document.querySelector(`[data-pulse-id="${pulseId}"]`);
    if (card) card.remove();
  }
}

// ── Feed ──────────────────────────────────────────────────────────────────────
function renderFeedTabs() {
  return `
    <div id="feed-tabs" class="flex border-b border-zinc-800 sticky top-14 lg:top-0 bg-zinc-950 z-10">
      <button id="tab-trending" onclick="switchTab('trending')"
        class="flex-1 py-4 text-sm text-center transition-colors ${APP.currentTab === 'trending' ? 'tab-active' : 'tab-inactive'}">
        Trending
      </button>
      <button id="tab-live" onclick="switchTab('live')"
        class="flex-1 py-4 text-sm text-center transition-colors ${APP.currentTab === 'live' ? 'tab-active' : 'tab-inactive'}">
        Live Beats
      </button>
      <button id="tab-following" onclick="switchTab('following')"
        class="flex-1 py-4 text-sm text-center transition-colors ${APP.currentTab === 'following' ? 'tab-active' : 'tab-inactive'}">
        Following
      </button>
    </div>
  `;
}

function switchTab(tab) {
  APP.currentTab = tab;
  ['trending', 'live', 'following'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.className = `flex-1 py-4 text-sm text-center transition-colors ${tab === t ? 'tab-active' : 'tab-inactive'}`;
  });
  loadFeedPulses();
}

async function renderFeed() {
  const main = document.getElementById('main-content');
  main.innerHTML =
    renderComposeBox() +
    renderFeedTabs() +
    '<div id="feed-pulses"></div>';
  await loadFeedPulses();
}

async function loadFeedPulses(offset = 0) {
  const container = document.getElementById('feed-pulses');
  if (!container) return;
  if (offset === 0) container.innerHTML = '<div class="flex items-center justify-center h-24 text-zinc-500 text-sm">Loading…</div>';

  const url = APP.currentTab === 'trending'
    ? `/api/feed/trending?offset=${offset}`
    : APP.currentTab === 'live'
    ? `/api/feed/live?offset=${offset}`
    : `/api/feed/following?offset=${offset}`;
  const data = await api(url);
  const pulses = data.pulses || [];

  if (offset === 0) {
    if (!pulses.length) {
      const emptyMsg = APP.currentTab === 'following'
        ? `<div class="p-8 text-center"><p class="text-zinc-400 mb-2 font-medium">You're not following anyone yet.</p><p class="text-zinc-500 text-sm">Browse <button class="text-violet-400 hover:underline" onclick="switchTab('trending')">Trending</button> to find people to follow.</p></div>`
        : APP.currentTab === 'live'
        ? '<div class="p-8 text-center text-zinc-500">No pulses yet. Be the first to post!</div>'
        : '<div class="p-8 text-center text-zinc-500">No trending pulses yet. Be the first!</div>';
      container.innerHTML = emptyMsg;
      return;
    }
    container.innerHTML = '';
  }

  pulses.forEach(p => {
    const div = document.createElement('div');
    div.setAttribute('data-pulse-id', p.id);
    div.innerHTML = renderPulseCard(p);
    container.appendChild(div);
  });

  if (pulses.length === 20) {
    const lm = document.createElement('div');
    lm.id = 'load-more';
    lm.innerHTML = `<button class="w-full py-4 text-violet-400 hover:text-violet-300 text-sm font-semibold transition-colors border-t border-zinc-800" onclick="loadMoreFeed(${offset + 20})">Load more</button>`;
    container.appendChild(lm);
  }
}

async function loadMoreFeed(offset) {
  const lm = document.getElementById('load-more');
  if (lm) lm.remove();
  await loadFeedPulses(offset);
}

// ── Thread view ───────────────────────────────────────────────────────────────
async function renderThreadView(pulseId) {
  window._threadPulseId = pulseId;
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="flex items-center gap-3 px-4 py-3 border-b border-zinc-800 sticky top-14 lg:top-0 bg-zinc-950 z-10">
      <button onclick="navigate('feed')" class="p-1.5 rounded-full hover:bg-zinc-800 transition-colors text-zinc-400 hover:text-zinc-100">${ICON_BACK}</button>
      <h2 class="font-bold text-lg">Pulse</h2>
    </div>
    <div id="thread-root" class="text-zinc-500 text-sm p-4">Loading…</div>
    <div id="thread-comments" class="divide-y divide-zinc-800"></div>
    <div class="border-t border-zinc-800 mt-2">
      ${renderComposeBox('Add your reply…', 'comment')}
    </div>
  `;

  const composeBtn = document.getElementById('compose-btn');
  if (composeBtn) composeBtn.onclick = () => handleCompose('comment');

  const [pulseData, commentsData] = await Promise.all([
    api(`/api/pulses/${pulseId}`),
    api(`/api/pulses/${pulseId}/comments`),
  ]);

  const rootEl = document.getElementById('thread-root');
  if (pulseData.error || !pulseData.pulse) {
    rootEl.innerHTML = '<p class="text-red-400">Pulse not found.</p>';
    return;
  }
  rootEl.innerHTML = renderPulseCard(pulseData.pulse, true);

  const commentsEl = document.getElementById('thread-comments');
  const comments = commentsData.comments || [];
  if (!comments.length) {
    commentsEl.innerHTML = '<p class="text-zinc-500 text-sm px-4 py-4">No replies yet. Be the first!</p>';
  } else {
    commentsEl.innerHTML = comments.map(c => `
      <div class="p-4 hover:bg-white/[0.02] transition-colors">
        <div class="flex gap-3">
          <div class="avatar" onclick="navigate('profile/${esc(c.username)}')">${esc(initials(c.username))}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 flex-wrap mb-1">
              <button class="font-semibold text-zinc-100 hover:underline text-sm" onclick="navigate('profile/${esc(c.username)}')">${esc(c.username)}</button>
              ${c.signature ? `<span class="text-violet-400 inline-flex items-center gap-0.5 text-xs" title="Signed">${ICON_CHAIN}</span>` : ''}
              <span class="text-zinc-500 text-xs">${timeAgo(c.created_at)}</span>
            </div>
            <p class="text-sm text-zinc-100 leading-relaxed whitespace-pre-wrap break-words">${esc(c.content)}</p>
          </div>
        </div>
      </div>
    `).join('');
  }
}

// ── Profile page ──────────────────────────────────────────────────────────────
async function renderProfile(username) {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="flex items-center gap-3 px-4 py-3 border-b border-zinc-800 sticky top-14 lg:top-0 bg-zinc-950 z-10">
      <button onclick="history.back()" class="p-1.5 rounded-full hover:bg-zinc-800 transition-colors text-zinc-400 hover:text-zinc-100">${ICON_BACK}</button>
      <h2 class="font-bold text-lg">${esc(username)}</h2>
    </div>
    <div id="profile-header" class="p-4 border-b border-zinc-800 text-zinc-500 text-sm">Loading…</div>
    <div id="profile-pulses"></div>
  `;

  const [profileData, pulsesData] = await Promise.all([
    api(`/api/users/${encodeURIComponent(username)}`),
    api(`/api/users/${encodeURIComponent(username)}/pulses`),
  ]);

  const headerEl = document.getElementById('profile-header');
  if (profileData.error) {
    headerEl.innerHTML = '<p class="text-red-400">User not found.</p>';
    return;
  }

  const isMe = username === APP.me.username;
  const isFollowing = profileData.is_following;

  headerEl.innerHTML = `
    <div class="flex items-start gap-4">
      <div class="avatar avatar-lg">${esc(initials(username))}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-3 mb-2">
          <div class="min-w-0">
            <h3 class="font-bold text-xl text-zinc-100 truncate">${esc(username)}</h3>
            ${profileData.usernode_pubkey ? `
              <div class="flex items-center gap-1 text-violet-400 text-xs mt-0.5">
                ${ICON_CHAIN} <span>${esc(abbrevPubkey(profileData.usernode_pubkey))}</span>
              </div>` : ''}
          </div>
          ${!isMe ? `
            <button id="follow-btn"
              class="shrink-0 px-4 py-1.5 rounded-full text-sm font-bold transition-colors ${isFollowing ? 'bg-zinc-700 hover:bg-red-900/70 text-zinc-100 border border-zinc-600' : 'bg-violet-600 hover:bg-violet-500 text-white'}"
              onclick="handleFollow('${esc(username)}', ${isFollowing})">
              ${isFollowing ? 'Following' : 'Follow'}
            </button>` : ''}
        </div>
        <div class="flex gap-5 text-sm mt-2">
          <span><strong class="text-zinc-100 font-semibold">${profileData.following_count}</strong><span class="text-zinc-500 ml-1">Following</span></span>
          <span><strong class="text-zinc-100 font-semibold">${profileData.follower_count}</strong><span class="text-zinc-500 ml-1">Followers</span></span>
          <span><strong class="text-zinc-100 font-semibold">${profileData.pulse_count}</strong><span class="text-zinc-500 ml-1">Pulses</span></span>
        </div>
      </div>
    </div>
  `;

  const pulsesEl = document.getElementById('profile-pulses');
  const pulses = pulsesData.pulses || [];
  if (!pulses.length) {
    pulsesEl.innerHTML = '<p class="text-zinc-500 text-sm p-6 text-center">No pulses yet.</p>';
  } else {
    pulsesEl.innerHTML = pulses.map(p => `<div data-pulse-id="${p.id}">${renderPulseCard(p)}</div>`).join('');
  }
}

async function handleFollow(username, currentlyFollowing) {
  const btn = document.getElementById('follow-btn');
  if (btn) btn.disabled = true;
  try {
    const res = await api(
      `/api/users/${encodeURIComponent(username)}/follow`,
      { method: currentlyFollowing ? 'DELETE' : 'POST' }
    );
    if (res.error) throw new Error(res.error);
    const newFollowing = !currentlyFollowing;
    if (btn) {
      btn.className = `shrink-0 px-4 py-1.5 rounded-full text-sm font-bold transition-colors ${newFollowing ? 'bg-zinc-700 hover:bg-red-900/70 text-zinc-100 border border-zinc-600' : 'bg-violet-600 hover:bg-violet-500 text-white'}`;
      btn.textContent = newFollowing ? 'Following' : 'Follow';
      btn.setAttribute('onclick', `handleFollow('${username}', ${newFollowing})`);
      btn.disabled = false;
    }
    showToast(newFollowing ? `Following ${username}` : `Unfollowed ${username}`);
    loadSuggestions();
  } catch (e) {
    showToast(e.message || 'Failed.', true);
    if (btn) btn.disabled = false;
  }
}

// ── Search placeholder ────────────────────────────────────────────────────────
function renderSearch() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="flex items-center gap-3 px-4 py-3 border-b border-zinc-800 sticky top-14 lg:top-0 bg-zinc-950 z-10">
      <h2 class="font-bold text-lg">Search</h2>
    </div>
    <div class="p-8 text-center">
      <div class="text-5xl mb-4">🔍</div>
      <h3 class="font-bold text-lg mb-2">Search is coming soon</h3>
      <p class="text-zinc-500 text-sm">Find pulses, people, and topics.</p>
    </div>
  `;
}

// ── Right sidebar: Who to follow ──────────────────────────────────────────────
async function loadSuggestions() {
  const el = document.getElementById('suggestions-list');
  if (!el) return;

  try {
    const data = await api('/api/suggestions');
    const suggestions = data.suggestions || [];

    if (!suggestions.length) {
      el.innerHTML = '<p class="px-4 py-3 text-zinc-500 text-sm">No suggestions right now.</p>';
      return;
    }

    el.innerHTML = suggestions.map(u => `
      <div class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800/60 transition-colors">
        <div class="avatar-sm cursor-pointer" onclick="navigate('profile/${esc(u.username)}')">${esc(initials(u.username))}</div>
        <div class="flex-1 min-w-0">
          <button class="font-semibold text-sm text-zinc-100 hover:underline truncate block w-full text-left"
            onclick="navigate('profile/${esc(u.username)}')">${esc(u.username)}</button>
          ${u.usernode_pubkey ? `<span class="text-violet-400 text-xs inline-flex items-center gap-0.5">${ICON_CHAIN} ${esc(abbrevPubkey(u.usernode_pubkey))}</span>` : ''}
        </div>
        <button class="shrink-0 px-3 py-1 rounded-full bg-zinc-100 text-zinc-950 text-xs font-bold hover:bg-white transition-colors"
          onclick="handleFollowSuggestion('${esc(u.username)}', this)">Follow</button>
      </div>
    `).join('');
  } catch (e) {
    const el2 = document.getElementById('suggestions-list');
    if (el2) el2.innerHTML = '<p class="px-4 py-3 text-zinc-500 text-sm">Could not load suggestions.</p>';
  }
}

async function handleFollowSuggestion(username, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  const res = await api(`/api/users/${encodeURIComponent(username)}/follow`, { method: 'POST' });
  if (res.error) {
    showToast(res.error, true);
    btn.textContent = 'Follow';
    btn.disabled = false;
    return;
  }
  btn.textContent = 'Following';
  btn.className = 'shrink-0 px-3 py-1 rounded-full bg-zinc-700 text-zinc-100 text-xs font-semibold cursor-default border border-zinc-600';
  showToast('Following ' + username);
}

// ── Router ────────────────────────────────────────────────────────────────────
function navigate(route) {
  location.hash = route;
}

function handleRoute() {
  const hash = (location.hash || '').replace(/^#\/?/, '');
  updateNavActive(hash);
  if (!hash || hash === 'feed') {
    renderFeed();
  } else if (hash === 'search') {
    renderSearch();
  } else if (hash.startsWith('profile/')) {
    renderProfile(decodeURIComponent(hash.slice('profile/'.length)));
  } else if (hash.startsWith('pulse/')) {
    renderThreadView(hash.slice('pulse/'.length));
  } else {
    renderFeed();
  }
}

window.addEventListener('hashchange', handleRoute);

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function boot() {
  if (TOKEN) {
    try {
      const parts = TOKEN.split('.');
      if (parts.length === 3) {
        const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        APP.me.id = payload.id;
        APP.me.username = payload.username || '';
        APP.me.usernode_pubkey = payload.usernode_pubkey || null;
      }
    } catch (e) { console.warn('Token parse error:', e); }
  }

  // Populate sidebar identity
  const usernameEl = document.getElementById('sidebar-username');
  const pubkeyEl = document.getElementById('sidebar-pubkey');
  const avatarEl = document.getElementById('sidebar-avatar-el');
  if (usernameEl) usernameEl.textContent = APP.me.username;
  if (pubkeyEl) pubkeyEl.textContent = APP.me.usernode_pubkey ? abbrevPubkey(APP.me.usernode_pubkey) : '';
  if (avatarEl) avatarEl.textContent = initials(APP.me.username);

  // Load right sidebar suggestions (non-blocking)
  loadSuggestions();

  // Route to initial view
  handleRoute();
}

boot();
</script>
</body>
</html>
